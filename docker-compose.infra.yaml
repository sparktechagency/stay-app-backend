version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - template-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9095:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - template-network

  # mongo:
  #   image: mongo:6
  #   container_name: mongo
  #   ports:
  #     - "27018:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #     - ./mongo-keyfile:/etc/mongo-keyfile
  #   command: >
  #     bash -c "
  #     chmod 400 /etc/mongo-keyfile &&
  #     mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
  #     "
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
  #     MONGO_INITDB_ROOT_PASSWORD: 1
  #   networks:
  #     - template-network

  mongo-express:
    image: mongo-express
    ports:
      - 8085:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://187.77.173.240:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: 1
    networks:
      - template-network

  redis:
    image: redis
    ports:
      - 6375:6379
    volumes:
      - redisdata:/data
    networks:
      - template-network


volumes:
  # mongo_data:
  redisdata:

networks:
  template-network:
    driver: bridge
    external: true